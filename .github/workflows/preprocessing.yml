name: Automated Preprocessing

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  preprocessing:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pandas numpy scikit-learn

      - name: Run preprocessing
        run: |
          python preprocessing/automate_rahmahidayatifitrah.py

      - name: Upload preprocessed dataset
        uses: actions/upload-artifact@v4
        with:
          name: preprocessed-dataset
          path: |
            winequality_preprocessing.csv
            winequality_test.csv

      - name: Commit preprocessed dataset
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add winequality_preprocessing.csv winequality_test.csv
          git diff --staged --quiet || git commit -m "Auto: update preprocessed dataset"
          git push
